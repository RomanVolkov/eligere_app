# Filter browsers by whether they are currently running.
# When true, only open browsers appear in the picker.
# More information: https://github.com/RomanVolkov/eligere_app/tree/main/docs/config.md#useonlyrunningbrowsers
useOnlyRunningBrowsers = false

# Remove tracking parameters (utm_*, gclid, fbclid, attribution_id) from URLs.
# More information: https://github.com/RomanVolkov/eligere_app/tree/main/docs/config.md#striptrackingattributes
stripTrackingAttributes = true

# Resolve shortened URLs before routing to see the real destination.
# More information: https://github.com/RomanVolkov/eligere_app/tree/main/docs/config.md#expandShortenURLs
expandShortenURLs = true

# Time in seconds a pinned browser stays as the temporary default.
# Pin a browser by holding Shift while pressing its shortcut key.
# More information: https://github.com/RomanVolkov/eligere_app/tree/main/docs/config.md#pinningseconds
pinningSeconds = 30

# Log verbosity: trace, debug, info, notice, warning, error, critical.
# More information: https://github.com/RomanVolkov/eligere_app/tree/main/docs/config.md#loglevel
logLevel = "warning"

[[browsers]]
# Name of a browser from /Applications/. Required. Must match the .app name.
# More information: https://github.com/RomanVolkov/eligere_app/tree/main/docs/config.md#name
name = "Safari"

# Single-character keyboard shortcut to select this browser in the picker.
# More information: https://github.com/RomanVolkov/eligere_app/tree/main/docs/config.md#shortcut
shortcut = "s"

# Open links from these source apps in this browser automatically.
# More information: https://github.com/RomanVolkov/eligere_app/tree/main/docs/config.md#apps
apps = ["Messages"]

# Route URLs containing these strings to this browser.
# Longer matches take priority over shorter ones.
# More information: https://github.com/RomanVolkov/eligere_app/tree/main/docs/config.md#domains
domains = ["apple.com"]

# Use this browser as the fallback when no other rule matches.
# Only one browser should have default = true.
# More information: https://github.com/RomanVolkov/eligere_app/tree/main/docs/config.md#default
# default = true

# Hide this browser from the picker UI. Rules still apply silently.
# More information: https://github.com/RomanVolkov/eligere_app/tree/main/docs/config.md#hidden
# hidden = false

# Extra arguments passed to the browser on launch.
# More information: https://github.com/RomanVolkov/eligere_app/tree/main/docs/config.md#arguments
# arguments = []

# Open a specific browser profile instead of the default one.
# Chrome: profile directory name (e.g. "Default", "Profile 1")
# Firefox: profile name from about:profiles
# More information: https://github.com/RomanVolkov/eligere_app/tree/main/docs/config.md#profile
# profile = "Default"
